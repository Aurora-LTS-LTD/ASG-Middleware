# aurora-api — production NON-SECRET environment (config-as-code).
# Source of truth for the operational env the Cloud Run service runs with.
# Secrets are NOT here — they are wired via --set-secrets from Secret Manager
# (see restore-service-config.sh). Apply with: gcloud ... --env-vars-file env.prod.yaml
# Captured from the live service 2026-06-18 (revision aurora-api-00102-qaf / v1-15-7).
#
# ⚠️ Pre-launch states to flip before real launch traffic (see README.md):
#   ITA_BACKEND=mock (+ AURORA_ALLOW_MOCK_ITA=1), PAYPLUS_API_BASE=sandbox,
#   SMS_PROVIDER=stub, ONBOARDING_REQUIRE_PHONE_OTP=false, OCR/DLP/GEMINI=stub.

AURORA_RUNTIME: "cloud_run"
SKIP_SEED_ADMIN: "1"
COMPANY_NAME_HE: 'אורורה אל.טי.אס. בע"מ'
COMPANY_NAME_EN: "AURORA LTS LTD"
PUBLIC_DOMAIN: "aurora-ltd.co.il"
SERVER_BASE_URL: "https://aurora-ltd.co.il"
ONBOARDING_PUBLIC_URL: "https://aurora-ltd.co.il/onboarding"

# ── Backend selectors ──
KYC_BACKEND: "gcs"
STORAGE_BACKEND: "gcs"
AUDIT_BIGQUERY_BACKEND: "gcp"
SECRET_BACKEND: "env"
PAYPLUS_BACKEND: "production"
OTP_BACKEND: "production"
ITA_BACKEND: "mock"
OCR_BACKEND: "stub"
DLP_BACKEND: "stub"
GEMINI_BACKEND: "stub"
SMS_PROVIDER: "stub"

# ── Onboarding / launch-window flags ──
AURORA_ALLOW_MOCK_ITA: "1"
ONBOARDING_REQUIRE_PHONE_OTP: "false"
ONBOARDING_TRIAL_DAYS: "14"
KYC_MANUAL_REVIEW_FIRST_N: "50"
INVITATION_TTL_HOURS: "72"
SENDGRID_FROM: "noreply@aurora-ltd.co.il"

# ── DB pool budget (f1-micro; see README + db-unblock notes) ──
AURORA_DB_POOL_SIZE: "5"
AURORA_DB_MAX_OVERFLOW: "5"
AURORA_CLOUD_SQL_MAX_CONNECTIONS: "22"
AURORA_CLOUD_RUN_MAX_INSTANCES: "1"

# ── PayPlus (SANDBOX until launch) ──
PAYPLUS_API_BASE: "https://sandboxapi.payplus.co.il"

# ── Storage / GCP ──
GOOGLE_CLOUD_PROJECT: "aurora-lts-prod"
GCS_BUCKET_KYC: "aurora-lts-prod-secure-storage"
GCS_BUCKET_RECEIPTS: "aurora-lts-prod-secure-storage"
BIGQUERY_AUDIT_DATASET: "asg_audit"

# ── JWT / WhatsApp meta ──
JWT_EXPIRATION_HOURS: "24"
WHATSAPP_API_VERSION: "v20.0"
WA_REQUIRE_SIGNATURE: "1"

# ── Receipts / revenue-share tuning ──
RECEIPT_CONFIDENCE_AUTO_THRESHOLD: "0.85"
RECEIPT_CONFIDENCE_REVIEW_THRESHOLD: "0.60"
REVENUE_SHARE_DEFAULT_PCT: "20.0"
REVENUE_SHARE_MIN_TENANT_DAYS: "90"
REVENUE_SHARE_MIN_INVOICES: "5"

# ── Admin / IAP / OIDC ──
AURORA_ADMIN_REQUIRE_IAP: "1"
AURORA_ADMIN_IAP_ALLOWLIST: "ibraheem@aurora-ltd.co.il"
AURORA_ADMIN_BACKEND_NUMBER: "8296331481079946570"
AURORA_PROJECT_NUMBER: "9801563953"
AURORA_OIDC_SA_ALLOWLIST: "aurora-run@aurora-lts-prod.iam.gserviceaccount.com"
AURORA_OIDC_CRON_ALLOWLIST: "aurora-run@aurora-lts-prod.iam.gserviceaccount.com"
AURORA_OIDC_AUDIENCE: "https://api-aurora-lts.com"

# ── Executive console / WebAuthn ──
AURORA_EXEC_REQUIRE_STEP_UP: "1"
AURORA_WEBAUTHN_RP_ID: "console.api-aurora-lts.com"
AURORA_WEBAUTHN_RP_NAME: "Aurora LTS Executive"
AURORA_WEBAUTHN_ORIGIN: "https://console.api-aurora-lts.com"
AURORA_WEBAUTHN_ALLOWED_ORIGINS: "https://console.api-aurora-lts.com"

# ── Copilot / Vertex ──
AURORA_COPILOT_MODEL: "claude-sonnet-4-5-20250929"
AURORA_COPILOT_MAX_TURNS_PER_HOUR: "30"
AURORA_COPILOT_SOFT_BUDGET_USD: "4"
AURORA_COPILOT_HARD_BUDGET_USD: "5"
VERTEX_PROJECT: "aurora-lts-prod"
VERTEX_LOCATION: "me-west1"
VERTEX_DEFAULT_MODEL: "gemini-1.5-pro-002"
VERTEX_DEFAULT_FAST_MODEL: "gemini-1.5-flash-002"
