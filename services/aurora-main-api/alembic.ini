# ============================================================
# Aurora LTS — Alembic configuration (P1-02)
# ============================================================
# All NEW schema changes go through Alembic. Existing migrate_phase*.py
# files (P4..P21+vault) are frozen as-is and continue to run idempotently
# under the P1-01 advisory lock.
#
# On first boot in any environment, the bootstrap helper:
#   - creates the alembic_version table if missing
#   - stamps it to the latest baseline revision (no DDL — current
#     schema IS the baseline)
# Subsequent boots run `alembic upgrade head` and apply any new
# revisions that have been merged since.
#
# To create a new migration locally:
#   cd server_files
#   alembic revision --autogenerate -m "describe change"
#
# DATABASE_URL is injected at runtime by env.py — DO NOT hardcode here.
# ============================================================

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url is set programmatically by env.py from DATABASE_URL


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
